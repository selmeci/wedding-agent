<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />

    <title>Prístup obmedzený - Ivonka & Roman</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(
          to bottom right,
          #fff5f7 0%,
          #ffffff 50%,
          #ffe3e8 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .heading-font {
        font-family: "Playfair Display", serif;
      }

      /* Header - matching chat header exactly */
      header {
        background: linear-gradient(
          135deg,
          #ffe3e8 0%,
          #ff9bb0 50%,
          #ff6b8e 100%
        );
        padding: 0.5rem 1rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }

      /* Mobile header layout */
      .header-mobile {
        display: block;
        text-align: center;
      }

      .header-mobile .pixel-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }

      .header-mobile h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: white;
        margin: 0;
      }

      .header-mobile p {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.9);
        margin-top: 0.25rem;
      }

      /* Desktop header layout */
      .header-desktop {
        display: none;
      }

      .pixel-art {
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }

      .header-mobile .pixel-art {
        width: 3rem;
        height: 3rem;
      }

      .header-mobile .heart {
        width: 2rem;
        height: 2rem;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      .heart {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      /* Main content */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .content {
        text-align: center;
        max-width: 48rem;
      }

      .groom-stop {
        margin-bottom: 2rem;
      }

      .groom-stop svg {
        width: 10rem;
        height: 10rem;
      }

      h1 {
        font-size: 1.875rem;
        font-weight: 700;
        color: #111827;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.125rem;
        color: #4b5563;
        line-height: 1.75;
      }

      /* Desktop styles */
      @media (min-width: 768px) {
        header {
          padding: 1.5rem 1rem;
        }

        .header-mobile {
          display: none;
        }

        .header-desktop {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 1rem;
        }

        .header-desktop .pixel-art {
          width: 4rem;
          height: 4rem;
        }

        .header-desktop .heart {
          width: 2.5rem;
          height: 2.5rem;
        }

        .header-desktop h1 {
          font-size: 1.875rem;
          font-weight: 700;
          color: white;
          margin: 0;
        }

        .header-desktop p {
          font-size: 0.875rem;
          color: rgba(255, 255, 255, 0.9);
          margin-top: 0.25rem;
        }

        .header-desktop .text-center {
          text-align: center;
        }

        .groom-stop svg {
          width: 12rem;
          height: 12rem;
        }

        h1 {
          font-size: 2.25rem;
        }

        p {
          font-size: 1.25rem;
        }
      }

      @media (min-width: 1024px) {
        .header-desktop .pixel-art {
          width: 5rem;
          height: 5rem;
        }

        .header-desktop .heart {
          width: 3rem;
          height: 3rem;
        }

        .header-desktop h1 {
          font-size: 2.25rem;
        }

        .header-desktop p {
          font-size: 1rem;
        }

        .groom-stop svg {
          width: 16rem;
          height: 16rem;
        }

        h1 {
          font-size: 3rem;
        }
      }
